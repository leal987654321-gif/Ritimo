<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ritmo</title>
    <style>
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      #initial-loading {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: sans-serif;
        color: #6366f1;
        background-color: #f9fafb;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #f3f4f6;
        border-top: 4px solid #6366f1;
        border-radius: 50%;
        margin: 0 auto 20px;
        animation: spin 1s linear infinite;
      }
    </style>
  </head>
  <body>
    <div id="initial-loading">
      <div class="loader-content">
        <div class="spinner"></div>
        <p>Carregando Ritmo...</p>
      </div>
    </div>
    <div id="root"></div>

    <style>
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      #initial-loading {
        position: fixed;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #f9fafb;
        z-index: 9999;
        font-family: sans-serif;
        color: #6366f1;
        transition: opacity 0.5s ease-out;
      }
      .loader-content { text-align: center; }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #f3f4f6;
        border-top: 4px solid #6366f1;
        border-radius: 50%;
        margin: 0 auto 20px;
        animation: spin 1s linear infinite;
      }
      body.app-ready #initial-loading {
        opacity: 0;
        pointer-events: none;
      }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
